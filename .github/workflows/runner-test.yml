name: Runner Test

on:
  workflow_dispatch:

jobs:
  hello:
    runs-on: [self-hosted, Windows, X64]
    
    steps:
    - name: Hello
      run: echo Hello from Windows Runner! && echo Runner: ${{ runner.name }} && echo OS: ${{ runner.os }}
      
    - name: Check Java
      run: where java && java -version || echo Java not found
      
    - name: Check Android  
      run: echo ANDROID_HOME=%ANDROID_HOME%
