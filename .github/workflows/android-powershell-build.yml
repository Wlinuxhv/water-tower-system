name: Android Build - PowerShell

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Windows, X64]
    
    steps:
    - name: 设置环境
      run: |
        # 设置 Java 环境 (Android Studio 内置 JBR)
        $javaHome = "C:\Program Files\Android\Android Studio\jbr\bin"
        $env:JAVA_HOME = $javaHome
        [Environment]::SetEnvironmentVariable("JAVA_HOME", $javaHome, "Process")
        $env:PATH = "$javaHome;$env:PATH"
        [Environment]::SetEnvironmentVariable("PATH", "$javaHome;$env:PATH", "Process")
        
        # 设置 Android SDK 环境
        $androidHome = "C:\Users\$env:USERNAME\AppData\Local\Android\Sdk"
        $env:ANDROID_HOME = $androidHome
        $env:ANDROID_SDK_ROOT = $androidHome
        [Environment]::SetEnvironmentVariable("ANDROID_HOME", $androidHome, "Process")
        [Environment]::SetEnvironmentVariable("ANDROID_SDK_ROOT", $androidHome, "Process")
        
        Write-Host "=== 环境设置完成 ==="
        Write-Host "JAVA_HOME: $env:JAVA_HOME"
        Write-Host "ANDROID_HOME: $env:ANDROID_HOME"
        
        # 验证 Java (使用 cmd 以避免 PowerShell 输出问题)
        Write-Host "`n=== Java 版本 ==="
        cmd /c "java -version" 2>&1
        
        # 检查 Gradle Wrapper
        if (Test-Path "android_app\gradlew.bat") {
          Write-Host "`n✅ Gradle Wrapper 存在"
        } else {
          Write-Host "`n❌ Gradle Wrapper 不存在"
        }
      shell: powershell
      
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 编译 APK
      working-directory: android_app
      shell: powershell
      run: |
        Write-Host "=== 开始编译 ==="
        
        # 继承上一步设置的环境变量
        Write-Host "JAVA_HOME: $env:JAVA_HOME"
        Write-Host "ANDROID_HOME: $env:ANDROID_HOME"
        
        # 创建 local.properties
        if ($env:ANDROID_HOME) {
          "sdk.dir=$env:ANDROID_HOME" | Out-File -FilePath local.properties -Encoding ASCII
          Write-Host "`n创建 local.properties:"
          Get-Content local.properties
        }
        
        # 清理
        if (Test-Path "app\build") { Remove-Item -Recurse -Force "app\build" }
        if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
        Write-Host "`n清理完成"
        
        # 编译 (使用 cmd 执行以避免 PowerShell 编码问题)
        Write-Host "`n执行：gradlew.bat assembleDebug --no-daemon"
        cmd /c "gradlew.bat assembleDebug --no-daemon"
        
        if ($LASTEXITCODE -eq 0) {
          Write-Host "`n✅ 编译成功!"
        } else {
          Write-Host "`n❌ 编译失败! 退出码：$LASTEXITCODE"
          exit 1
        }
      
    - name: 查找 APK
      id: apk
      shell: powershell
      run: |
        Write-Host "=== 查找 APK ==="
        $apk = Get-ChildItem -Recurse -Filter "*.apk" -Path "app\build\outputs\apk\debug" | 
               Sort-Object LastWriteTime -Descending | 
               Select-Object -First 1
        
        if ($apk) {
          $sizeMB = [math]::Round($apk.Length / 1MB, 2)
          Write-Host "✅ 找到：$($apk.Name)"
          Write-Host "   大小：$sizeMB MB"
          
          echo "apk-path=$($apk.FullName)" >> $env:GITHUB_OUTPUT
          echo "apk-name=$($apk.Name)" >> $env:GITHUB_OUTPUT
          echo "apk-size=$sizeMB" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "❌ 未找到 APK"
          exit 1
        }
      
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: water-tower-monitor-powershell
        path: ${{ steps.apk.outputs.apk-path }}
        retention-days: 30
        
    - name: 构建总结
      shell: powershell
      run: |
        Write-Host "`n================================"
        Write-Host "  🎉 构建完成!"
        Write-Host "================================"
        Write-Host "APK: ${{ steps.apk.outputs.apk-name }}"
        Write-Host "大小：${{ steps.apk.outputs.apk-size }} MB"
        Write-Host "下载：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        Write-Host "================================`n"
