name: Local Build - All Firmwares

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/runner-*.yml'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  build-all:
    name: Build All Firmwares
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 60
    env:
      JAVA_HOME: C:\Program Files\Java\jdk-17.0.2
      ANDROID_HOME: C:\Users\User\AppData\Local\Android\Sdk
      ANDROID_SDK_ROOT: C:\Users\User\AppData\Local\Android\Sdk
      PATH: C:\Program Files\Java\jdk-17.0.2\bin;C:\Users\User\AppData\Local\Android\Sdk\platform-tools;C:\Users\User\AppData\Local\Android\Sdk\tools;C:\Program Files\SDCC\bin;C:\Users\User\.local\bin;%(PATH)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 1
        clean: true
        
    - name: Show build environment
      run: |
        Write-Host "======================================" -ForegroundColor Cyan
        Write-Host "  Water Tower Monitor - Local Build" -ForegroundColor Cyan
        Write-Host "======================================" -ForegroundColor Cyan
        Write-Host "Runner: $env:RUNNER_NAME"
        Write-Host "Workspace: $env:GITHUB_WORKSPACE"
        Write-Host "Time: $(Get-Date)"
        Write-Host "======================================" -ForegroundColor Cyan
      shell: powershell
      
    # ==================== Check build tools ====================
    - name: Check build tools
      run: |
        Write-Host "`n[1] Checking build tools..." -ForegroundColor Yellow
        
        # Java
        if (Get-Command java -ErrorAction SilentlyContinue) {
          $javaVer = java -version 2>&1 | Select-Object -First 1
          Write-Host "[OK] Java: $javaVer" -ForegroundColor Green
        } else {
          Write-Host "[FAIL] Java not found" -ForegroundColor Red
        }
        
        # PlatformIO
        if (Get-Command pio -ErrorAction SilentlyContinue) {
          $pioVer = pio --version 2>&1
          Write-Host "[OK] PlatformIO: $pioVer" -ForegroundColor Green
        } else {
          Write-Host "[FAIL] PlatformIO not found" -ForegroundColor Red
        }
        
        # SDCC
        if (Get-Command sdcc -ErrorAction SilentlyContinue) {
          $sdccVer = sdcc --version 2>&1 | Select-Object -First 1
          Write-Host "[OK] SDCC: $sdccVer" -ForegroundColor Green
        } else {
          Write-Host "[FAIL] SDCC not found" -ForegroundColor Red
        }
        
        # Gradle
        if (Get-Command gradle -ErrorAction SilentlyContinue) {
          $gradleVer = gradle --version 2>&1 | Select-Object -First 1
          Write-Host "[OK] Gradle: $gradleVer" -ForegroundColor Green
        } else {
          Write-Host "[INFO] Gradle (using Wrapper)" -ForegroundColor Yellow
        }
      shell: powershell
      
    # ==================== Build Android APK ====================
    - name: Setup Android SDK
      run: |
        # Create local.properties with SDK path
        $sdkPath = "C:\Users\User\AppData\Local\Android\Sdk"
        Set-Location android_app
        "sdk.dir=$sdkPath" | Out-File -FilePath "local.properties" -Encoding utf8
        Write-Host "[OK] Android SDK configured: $sdkPath"
      shell: powershell
      
    - name: Build Android APK
      run: |
        Write-Host "`n[2] Building Android APK..." -ForegroundColor Yellow
        
        Set-Location android_app
        .\gradlew.bat assembleDebug --no-daemon
        
        if ($LASTEXITCODE -eq 0) {
          Write-Host "[OK] Android APK built successfully" -ForegroundColor Green
        } else {
          Write-Host "[FAIL] Android APK build failed" -ForegroundColor Red
          exit 1
        }
      shell: powershell
      
    - name: Find APK file
      id: find-apk
      run: |
        $apk = Get-ChildItem -Path "android_app/app/build/outputs/apk/debug" -Filter "*.apk" | Select-Object -First 1
        if ($apk) {
          Write-Host "[OK] APK: $($apk.Name) ($([math]::Round($apk.Length/1MB, 2)) MB)" -ForegroundColor Green
          Write-Host "apk_path=$($apk.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
        }
      shell: powershell
      
    # ==================== Build ESP8266 Firmware ====================
    - name: Build ESP8266 firmware
      run: |
        Write-Host "`n[3] Building ESP8266 firmware..." -ForegroundColor Yellow
        
        Set-Location esp8266_master
        pio run -e nodemcuv2
        
        if ($LASTEXITCODE -eq 0) {
          Write-Host "[OK] ESP8266 firmware built successfully" -ForegroundColor Green
        } else {
          Write-Host "[FAIL] ESP8266 firmware build failed" -ForegroundColor Red
          exit 1
        }
      shell: powershell
      
    - name: Find ESP8266 firmware
      id: find-esp
      run: |
        $bin = Get-ChildItem -Path "esp8266_master/.pio/build/nodemcuv2" -Filter "firmware.bin" | Select-Object -First 1
        if ($bin) {
          Write-Host "[OK] ESP8266: $($bin.Name) ($([math]::Round($bin.Length/1KB, 2)) KB)" -ForegroundColor Green
          Write-Host "esp_path=$($bin.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
        }
      shell: powershell
      
    # ==================== Build STC8G Firmware ====================
    - name: Build STC8G firmware
      run: |
        Write-Host "`n[4] Building STC8G firmware..." -ForegroundColor Yellow
        
        # Create output directories
        New-Item -ItemType Directory -Force -Path "slave_node_stc8g/output" | Out-Null
        New-Item -ItemType Directory -Force -Path "slave_node_stc8g/build" | Out-Null
        
        Set-Location slave_node_stc8g
        
        # Compile
        sdcc -mmcs51 --model-small --opt-code-size --no-xinit-opt --int-long-reent --float-reent --std-sdcc99 --all-callee-saves -Iinc -c src/main.c -o build/main.rel 2>$null
        sdcc -mmcs51 --model-small --opt-code-size --no-xinit-opt --int-long-reent --float-reent --std-sdcc99 --all-callee-saves -Iinc -c src/pan3031.c -o build/pan3031.rel 2>$null
        sdcc -mmcs51 --model-small --opt-code-size --no-xinit-opt --int-long-reent --float-reent --std-sdcc99 --all-callee-saves -Iinc -c src/sc09b.c -o build/sc09b.rel 2>$null
        
        # Link
        sdcc -mmcs51 --model-small --opt-code-size --no-xinit-opt --int-long-reent --float-reent --std-sdcc99 --all-callee-saves build/main.rel build/pan3031.rel build/sc09b.rel -o output/water_slave_stc8g.ihx 2>$null
        
        # Generate HEX
        & "C:\Program Files\SDCC\bin\packihx.exe" output/water_slave_stc8g.ihx > output/water_slave_stc8g.hex
        
        # Generate BIN
        & "C:\Program Files\SDCC\bin\sdobjcopy.exe" -I ihex -O binary output/water_slave_stc8g.ihx output/water_slave_stc8g.bin 2>$null
        
        Write-Host "[OK] STC8G firmware built successfully" -ForegroundColor Green
      shell: powershell
      
    - name: Find STC8G firmware
      id: find-stc
      run: |
        $bin = Get-ChildItem -Path "slave_node_stc8g/output" -Filter "*.bin" | Select-Object -First 1
        $hex = Get-ChildItem -Path "slave_node_stc8g/output" -Filter "*.hex" | Select-Object -First 1
        if ($bin -and $hex) {
          Write-Host "[OK] STC8G BIN: $($bin.Name) ($([math]::Round($bin.Length/1KB, 2)) KB)" -ForegroundColor Green
          Write-Host "[OK] STC8G HEX: $($hex.Name) ($([math]::Round($hex.Length/1KB, 2)) KB)" -ForegroundColor Green
          Write-Host "stc_path=$($bin.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8
        }
      shell: powershell
      
    # ==================== Upload artifacts ====================
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: ${{ steps.find-apk.outputs.apk_path }}
        retention-days: 30
        
    - name: Upload ESP8266 firmware
      uses: actions/upload-artifact@v4
      with:
        name: esp8266-firmware
        path: ${{ steps.find-esp.outputs.esp_path }}
        retention-days: 30
        
    - name: Upload STC8G firmware
      uses: actions/upload-artifact@v4
      with:
        name: stc8g-firmware
        path: ${{ steps.find-stc.outputs.stc_path }}
        retention-days: 30
        
    # ==================== Build summary ====================
    - name: Build summary
      run: |
        Write-Host "`n======================================" -ForegroundColor Cyan
        Write-Host "  [SUCCESS] All builds completed!" -ForegroundColor Cyan
        Write-Host "======================================" -ForegroundColor Cyan
        Write-Host ""
        Write-Host "Artifacts:" -ForegroundColor Yellow
        Write-Host "  [APP] Android APK: ${{ steps.find-apk.outputs.apk_path }}" -ForegroundColor Green
        Write-Host "  [FW] ESP8266:    ${{ steps.find-esp.outputs.esp_path }}" -ForegroundColor Green
        Write-Host "  [FW] STC8G:      ${{ steps.find-stc.outputs.stc_path }}" -ForegroundColor Green
        Write-Host ""
        Write-Host "======================================" -ForegroundColor Cyan
      shell: powershell
