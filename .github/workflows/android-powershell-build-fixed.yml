name: Android Build - PowerShell (Fixed)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'android_app/**'
      - '.github/workflows/android-powershell-build-fixed.yml'

jobs:
  build-android:
    name: 🤖 Build Android APK
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 60
    
    steps:
    - name: 设置环境变量
      run: |
        # Android Studio 自带的 Java (JBR)
        $javaPath = "C:\Program Files\Android\Android Studio\jbr"
        [Environment]::SetEnvironmentVariable("JAVA_HOME", $javaPath, "Process")
        
        # Android SDK (在用户目录下)
        $sdkPaths = @(
          "C:\Users\$env:USERNAME\AppData\Local\Android\Sdk",
          "C:\Android\Sdk",
          "C:\Program Files\Android\Sdk"
        )
        foreach ($p in $sdkPaths) {
          if (Test-Path $p) {
            [Environment]::SetEnvironmentVariable("ANDROID_HOME", $p, "Process")
            Write-Host "找到 Android SDK: $p"
            break
          }
        }
        
        # 添加到 PATH
        $newPath = "$javaPath\bin;$env:PATH"
        [Environment]::SetEnvironmentVariable("PATH", $newPath, "Process")
        
        Write-Host "✅ 环境变量设置完成"
        Write-Host "JAVA_HOME: $javaPath"
        Write-Host "ANDROID_HOME: $env:ANDROID_HOME"
      shell: powershell
      
    - name: 验证 Java
      run: |
        Write-Host "`n=== Java 验证 ==="
        java -version
        javac -version 2>&1 || Write-Host "javac 不可用"
      shell: powershell
      
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 编译 APK
      working-directory: android_app
      shell: powershell
      run: |
        Write-Host "`n=== 开始编译 ==="
        Write-Host "JAVA_HOME: $env:JAVA_HOME"
        Write-Host "ANDROID_HOME: $env:ANDROID_HOME"
        
        # 使用 gradlew 编译
        if (Test-Path "gradlew.bat") {
          .\gradlew.bat assembleDebug --no-daemon --stacktrace
        } else {
          Write-Host "❌ gradlew.bat 不存在"
          exit 1
        }
        
        Write-Host "`n✅ 编译完成"
      shell: powershell
      
    - name: 查找 APK
      id: find-apk
      run: |
        $apkPath = Get-ChildItem -Path "android_app\app\build\outputs\apk\debug" -Filter "*-debug.apk" -Recurse | Select-Object -First 1
        if ($apkPath) {
          Write-Host "✅ 找到 APK: $($apkPath.Name)"
          Write-Host "大小：$([math]::Round($apkPath.Length / 1MB, 2)) MB"
          echo "apk_path=$($apkPath.FullName)" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "❌ 未找到 APK"
          exit 1
        }
      shell: powershell
      
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: water-tower-monitor-debug
        path: ${{ steps.find-apk.outputs.apk_path }}
        retention-days: 30
