name: Build Android APK

on:
  push:
    paths:
      - 'android_app/**'
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
      
    - name: 编译 Debug APK
      working-directory: android_app
      run: |
        # 清除所有缓存
        rm -rf ~/.gradle/caches
        rm -rf .gradle
        
        # 赋予执行权限
        chmod +x gradlew
        
        # 清理并重新构建
        ./gradlew clean
        ./gradlew assembleDebug --no-daemon --stacktrace --info
        
        # 显示输出
        echo "=== 构建产物 ==="
        ls -la app/build/outputs/apk/debug/
        
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: water-tower-monitor-latest
        path: android_app/app/build/outputs/apk/debug/*.apk
        retention-days: 7
