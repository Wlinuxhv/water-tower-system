name: Build Android APK (China Mirror)

on:
  push:
    paths:
      - 'android_app/**'
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 JDK 17 (使用国内镜像)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
      
    - name: 配置 Gradle 国内镜像
      working-directory: android_app
      run: |
        # 配置阿里云镜像
        mkdir -p ~/.gradle
        cat > ~/.gradle/init.gradle << 'EOF'
        allprojects {
            repositories {
                maven { url 'https://maven.aliyun.com/repository/public' }
                maven { url 'https://maven.aliyun.com/repository/google' }
                maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                mavenCentral()
                google()
            }
        }
        EOF
        
        # 配置 wrapper 使用国内镜像
        sed -i 's|https://services.gradle.org/distributions/|https://mirrors.cloud.tencent.com/gradle/|' gradle/wrapper/gradle-wrapper.properties
        
    - name: 编译 Debug APK
      working-directory: android_app
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon --stacktrace
        
        echo "=== 构建产物 ==="
        ls -lh app/build/outputs/apk/debug/
        
    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: water-tower-monitor-latest
        path: android_app/app/build/outputs/apk/debug/*.apk
        retention-days: 7
