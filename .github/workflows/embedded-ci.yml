name: Embedded CI

on:
  push:
    paths:
      - 'esp8266_master/**'
      - 'slave_node/**'
      - 'slave_node_stc8g/**'
    branches: [ main, master ]
  pull_request:
    paths:
      - 'esp8266_master/**'
      - 'slave_node/**'
      - 'slave_node_stc8g/**'
  workflow_dispatch:

jobs:
  # ESP8266 编译
  esp8266:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 安装 PlatformIO
      run: |
        pip install platformio
        cd esp8266_master
        pio pkg install
        
    - name: 编译 ESP8266
      working-directory: esp8266_master
      run: |
        pio run -e nodemcuv2
        
    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: esp8266-firmware
        path: esp8266_master/.pio/build/nodemcuv2/firmware.bin

  # STC32G 编译 (slave_node 目录)
  stc32g:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 安装 SDCC
      run: |
        sudo apt-get update
        sudo apt-get install -y sdcc binutils
        
    - name: 编译 STC32G
      working-directory: slave_node
      run: |
        make clean
        make
        
    - name: 上传 HEX 文件
      uses: actions/upload-artifact@v4
      with:
        name: stc32g-hex
        path: slave_node/build/main.hex

  # STC8G1K08 编译 (slave_node_stc8g 目录)
  stc8g:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 安装 SDCC
      run: |
        sudo apt-get update
        sudo apt-get install -y sdcc binutils
        
    - name: 编译 STC8G
      working-directory: slave_node_stc8g
      run: |
        make clean
        make
        
    - name: 上传 HEX 文件
      uses: actions/upload-artifact@v4
      with:
        name: stc8g-hex
        path: slave_node_stc8g/output/water_slave_stc8g.hex

  # 代码检查
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 检查 C/C++ 代码
      run: |
        sudo apt-get install -y cppcheck
        cppcheck --enable=warning --inconclusive --error-exitcode=0 \
          esp8266_master/src/ \
          slave_node/src/ \
          slave_node_stc8g/src/ \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --suppress=unusedVariable \
          -i slave_node/src/pan3031.c \
          -i slave_node_stc8g/src/
